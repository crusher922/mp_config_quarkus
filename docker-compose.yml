version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce123
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ecommerce-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"

  app:
    build: .
    container_name: ecommerce-api
    depends_on:
      - mysql
      - keycloak
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ecommerce
      DB_USERNAME: ecommerce
      DB_PASSWORD: ecommerce123
      KEYCLOAK_URL: http://keycloak:8080/realms/ecommerce
      KEYCLOAK_CLIENT_ID: ecommerce-api
      KEYCLOAK_CLIENT_SECRET: change-me
    ports:
      - "8080:8080"

volumes:
  mysql_data:
