quarkus.http.port=8080

quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:ecommerce}
quarkus.datasource.password=${DB_PASSWORD:ecommerce123}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://mysql:3306/ecommerce}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080/realms/ecommerce}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:ecommerce-api}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:change-me}
quarkus.oidc.tls.verification=none

quarkus.http.auth.permission.public.paths=/api/health,/q/openapi,/q/swagger-ui/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.secured.paths=/api/*
quarkus.http.auth.permission.secured.policy=authenticated

quarkus.swagger-ui.always-include=true
